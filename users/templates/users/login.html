{% extends 'base.html' %}
{% load socialaccount %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto;">
    <h2>Вход</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Войти</button>
    </form>
    <p><a href="{% url 'users:password_reset' %}">Забыли пароль?</a></p>
    <p>Нет аккаунта? <a href="{% url 'users:register' %}">Зарегистрироваться</a></p>
    <hr style="margin: 20px 0;">
    <p style="text-align: center; margin-bottom: 10px;">Или войдите через</p>
    <a href="{% provider_login_url 'github' %}"
    style="display: block; text-align: center; background: #24292e; color: white; padding: 10px;
    border-radius: 5px; text-decoration: none;">
            Войти через GitHub
    </a>
</div>
{% endblock %}
